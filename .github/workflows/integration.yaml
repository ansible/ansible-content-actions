---
name: Integration
"on":
  workflow_call:
    inputs:
      galaxy_server_url:
        description: >-
          URL of an additional Galaxy server (e.g. Automation Hub).
          When set, the server is registered as "certified" and placed
          before the default Galaxy server in ANSIBLE_GALAXY_SERVER_LIST.
        required: false
        type: string
      galaxy_server_auth_url:
        description: >-
          SSO / token endpoint for the additional Galaxy server
          (e.g. the Red Hat SSO endpoint for Automation Hub).
        required: false
        type: string
    secrets:
      galaxy_server_token:
        description: >-
          Auth token for the additional Galaxy server.
        required: false
jobs:
  tox-matrix:
    name: Matrix Integration
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          ref: "${{github.event.pull_request.head.ref}}"
          repository: "${{ github.event.pull_request.head.repo.full_name }}"
      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.14"
      - name: "Check for tox-ansible.ini file, else add default"
        uses: ansible/ansible-content-actions/.github/actions/add_tox_ansible@main
      - name: "Install tox-ansible, includes tox"
        run: "python -m pip install git+https://github.com/ansible/tox-ansible.git"
      - name: Generate matrix
        id: generate-matrix
        run: >
          python -m tox --ansible --gh-matrix --matrix-scope integration --conf
          tox-ansible.ini
    outputs:
      envlist: "${{ steps.generate-matrix.outputs.envlist }}"
  test:
    needs: tox-matrix
    strategy:
      fail-fast: false
      matrix:
        entry: "${{ fromJson(needs.tox-matrix.outputs.envlist) }}"
    name: "${{ matrix.entry.name }}"
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          ref: "${{ github.event.pull_request.head.sha }}"
          fetch-depth: 0
      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "${{ matrix.entry.python }}"
      - name: "Check for tox-ansible.ini file, else add default"
        uses: ansible/ansible-content-actions/.github/actions/add_tox_ansible@main
      - name: "Install tox-ansible, includes tox"
        run: python -m pip install tox-ansible
      - name: Install build toolchain and openssl headers on Linux
        shell: bash
        run: sudo apt update && sudo apt install build-essential libssl-dev
        if: ${{ matrix.entry.python >= 3.12 }}
      - name: Install catchsegv and libssh headers on Linux for cythonize+coverage
        shell: bash
        run: sudo apt update && sudo apt install libssh-dev
        if: ${{ matrix.entry.python >= 3.12 }}
      - name: Run tox integration tests
        run: >-
          python -m tox --ansible -e ${{ matrix.entry.name }} --conf
          tox-ansible.ini
        env:
          GITHUB_TOKEN: "${{ secrets.GITHUB_TOKEN }}"
          ANSIBLE_GALAXY_SERVER_LIST: >-
            ${{ inputs.galaxy_server_url != '' && 'certified,galaxy' || '' }}
          ANSIBLE_GALAXY_SERVER_CERTIFIED_URL: ${{ inputs.galaxy_server_url }}
          ANSIBLE_GALAXY_SERVER_CERTIFIED_TOKEN: ${{ secrets.galaxy_server_token }}
          ANSIBLE_GALAXY_SERVER_CERTIFIED_AUTH_URL: ${{ inputs.galaxy_server_auth_url }}
