name: Close stale issues and PRs
on:
  workflow_call:
    inputs:
      days-before-stale:
        description: "Days of inactivity before marking as stale"
        type: number
        required: false
        default: 90
      days-before-close:
        description: "Days of inactivity before closing stale issues/PRs"
        type: number
        required: false
        default: 30
      exempt-issue-labels:
        description: "Comma-separated list of labels that exempt issues from being marked as stale"
        type: string
        required: false
        default: ""
      exempt-pr-labels:
        description: "Comma-separated list of labels that exempt PRs from being marked as stale"
        type: string
        required: false
        default: ""
      stale-issue-message:
        description: "Message to post when marking an issue as stale"
        type: string
        required: false
        default: "This issue has been automatically marked as stale because it has not had recent activity. It will be closed if no further activity occurs. Thank you for your contributions."
      stale-pr-message:
        description: "Message to post when marking a PR as stale"
        type: string
        required: false
        default: "This pull request has been automatically marked as stale because it has not had recent activity. It will be closed if no further activity occurs. Thank you for your contributions."
      close-issue-message:
        description: "Message to post when closing a stale issue"
        type: string
        required: false
        default: "This issue has been automatically closed due to inactivity. Please feel free to reopen if you would like to continue working on this."
      close-pr-message:
        description: "Message to post when closing a stale PR"
        type: string
        required: false
        default: "This pull request has been automatically closed due to inactivity. Please feel free to reopen if you would like to continue working on this."

jobs:
  stale:
    runs-on: ubuntu-latest
    permissions:
      issues: write
      pull-requests: write
    steps:
      - name: Close stale issues and PRs
        uses: actions/stale@v10.2.0
        with:
          days-before-stale: ${{ inputs.days-before-stale }}
          days-before-close: ${{ inputs.days-before-close }}
          exempt-issue-labels: ${{ inputs.exempt-issue-labels }}
          exempt-pr-labels: ${{ inputs.exempt-pr-labels }}
          stale-issue-message: ${{ inputs.stale-issue-message }}
          stale-pr-message: ${{ inputs.stale-pr-message }}
          close-issue-message: ${{ inputs.close-issue-message }}
          close-pr-message: ${{ inputs.close-pr-message }}
          stale-issue-label: "stale"
          stale-pr-label: "stale"
          exempt-draft-pr: true
